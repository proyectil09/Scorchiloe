<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScortChiloe</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: black;
        color: #ff4da6;
        text-align: center;
    }

    header {
        padding: 20px;
        font-size: 40px;
        font-weight: bold;
        letter-spacing: 2px;
        border-bottom: 2px solid #ff4da6;
    }

    .warning {
        background-color: #111;
        padding: 10px;
        font-size: 14px;
        color: #ff4da6;
        border-bottom: 1px solid #ff4da6;
    }

    .container {
        margin-top: 40px;
    }

    .btn {
        display: block;
        width: 250px;
        margin: 10px auto;
        padding: 15px;
        background-color: #ff4da6;
        color: black;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background-color: #ff1a8c;
        transform: scale(1.05);
    }

    .image-box {
        margin-top: 40px;
    }

    .image-box img {
        width: 250px;
        border-radius: 15px;
        box-shadow: 0 0 20px #ff4da6;
    }

    footer {
        margin-top: 40px;
        padding: 10px;
        font-size: 12px;
        color: #888;
    }
</style>
</head>

<body>

<header>ScortChiloe</header>

<div class="warning">
    ⚠️ Solo para mayores de 18 años
</div>

<div class="container">
    <button class="btn">Castro</button>
    <button class="btn">Quellón</button>
    <button class="btn">Ancud</button>
    <button class="btn">Puerto Montt</button>
    <button class="btn">Otros</button>
</div>

<div class="image-box">
    <!-- Puedes cambiar esta imagen por otra -->
    <img src="https://scortchiloe.online"alt="Mujer haciendo gesto de silencio">
    <p>Discreción y elegancia</p>
</div>

<footer>
    © 2026 ScortChiloe - Todos los derechos reservados
</footer>

</body>
</html>
